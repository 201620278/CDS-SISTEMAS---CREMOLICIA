  <script>
    (function bootTheme() {
      var KEY = 'cds-ui-theme';
      var THEMES = ['classic', 'dark', 'high-contrast'];
      var next = 'classic';
      try {
        var stored = localStorage.getItem(KEY);
        if (THEMES.indexOf(stored) >= 0) next = stored;
      } catch (e) {}
      document.documentElement.setAttribute('data-theme', next);
      THEMES.forEach(function (name) {
        document.documentElement.classList.toggle('theme-' + name, name === next);
      });
    })();
  </script>
</head>
