<!DOCTYPE html>
<html lang="pt-BR" data-theme="classic" class="theme-classic">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — CDS Sistemas</title>
    <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="/shared/design-system/index.css">
    <link rel="stylesheet" href="/shared/css/login.css">
</head>
<body class="login-page">
    <div class="login-shell">
        <aside class="login-brand-panel" aria-label="CDS Sistemas">
            <div class="login-brand-panel__media" role="img" aria-label="Gestão para sorveterias — CDS Sistemas"></div>
            <div class="login-brand-panel__overlay" aria-hidden="true"></div>
            <div class="login-brand-panel__content">
                <img
                    src="/shared/img/logo-cds-sistemas.png"
                    alt=""
                    class="login-brand-panel__logo"
                    width="120"
                    height="120"
                    decoding="async"
                >
                <h1 class="login-brand-panel__name">CDS Sistemas</h1>
                <p class="login-brand-panel__tagline">Plataforma Inteligente de Gestão</p>
                <span class="login-brand-panel__accent" aria-hidden="true"></span>
                <p class="login-brand-panel__pitch">
                    Controle produção, estoque, vendas e financeiro em um único lugar.
                </p>
            </div>
        </aside>

        <main class="login-auth-panel">
            <div class="login-auth-panel__top" role="group" aria-label="Tema da interface">
                <button type="button" class="login-theme-btn is-active" data-theme-set="classic" title="Tema clássico" aria-pressed="true">Claro</button>
                <button type="button" class="login-theme-btn" data-theme-set="dark" title="Tema noturno" aria-pressed="false">Escuro</button>
                <button type="button" class="login-theme-btn" data-theme-set="high-contrast" title="Alto contraste" aria-pressed="false">A+</button>
            </div>

            <section class="login-auth-card" aria-labelledby="login-welcome-title">
                <div class="login-auth-card__brand">
                    <img
                        src="/shared/img/logo-cds-sistemas.png"
                        alt="CDS Sistemas"
                        class="login-auth-card__logo"
                        width="72"
                        height="72"
                        decoding="async"
                    >
                    <h2 id="login-welcome-title" class="login-auth-card__title">Bem-vindo.</h2>
                    <p class="login-auth-card__subtitle">Entre com suas credenciais para acessar a plataforma.</p>
                </div>

                <form id="loginForm" class="login-form" autocomplete="on" novalidate>
                    <div class="login-field">
                        <label for="username" class="login-field__label">Usuário</label>
                        <div class="login-field__control">
                            <i class="fas fa-user login-field__icon" aria-hidden="true"></i>
                            <input
                                type="text"
                                class="cds-input"
                                id="username"
                                name="username"
                                required
                                autofocus
                                tabindex="1"
                                placeholder="Digite seu usuário"
                                autocomplete="username"
                            >
                        </div>
                    </div>

                    <div class="login-field">
                        <label for="password" class="login-field__label">Senha</label>
                        <div class="login-field__control">
                            <i class="fas fa-lock login-field__icon" aria-hidden="true"></i>
                            <input
                                type="password"
                                class="cds-input"
                                id="password"
                                name="password"
                                required
                                tabindex="2"
                                placeholder="Digite sua senha"
                                autocomplete="current-password"
                            >
                        </div>
                    </div>

                    <div id="login-error" class="cds-alert cds-alert--error login-error" role="alert" aria-live="polite"></div>

                    <button type="submit" class="login-submit" id="btn-entrar" tabindex="3">
                        <span class="login-submit__spinner" aria-hidden="true"></span>
                        <span class="login-submit__label"><i class="fas fa-sign-in-alt" aria-hidden="true"></i> Entrar</span>
                    </button>
                </form>

                <footer class="login-footer">
                    <span class="login-footer__brand">CDS Sistemas</span>
                    · v<span id="login-version">1.0.3</span>
                </footer>
            </section>
        </main>
    </div>

    <script src="/vendor/jquery/jquery.min.js"></script>
    <script src="/shared/platform/client.js"></script>
    <script src="/shared/js/estacaoHostname.js"></script>
    <script src="/shared/js/access-control.js"></script>
    <script src="/shared/js/login.js"></script>
    <script>
        (function initLoginTheme() {
            /* STAB-01.1: tema do login NÃO compartilha a chave do ERP (cds-ui-theme). */
            var STORAGE_KEY = 'cds-login-ui-theme';
            var THEMES = ['classic', 'dark', 'high-contrast'];
            var root = document.documentElement;

            function applyTheme(theme) {
                var next = THEMES.indexOf(theme) >= 0 ? theme : 'classic';
                root.setAttribute('data-theme', next);
                THEMES.forEach(function (name) {
                    root.classList.toggle('theme-' + name, name === next);
                });
                try { localStorage.setItem(STORAGE_KEY, next); } catch (e) {}
                document.querySelectorAll('[data-theme-set]').forEach(function (btn) {
                    var active = btn.getAttribute('data-theme-set') === next;
                    btn.classList.toggle('is-active', active);
                    btn.setAttribute('aria-pressed', active ? 'true' : 'false');
                });
            }

            var stored = null;
            try { stored = localStorage.getItem(STORAGE_KEY); } catch (e) {}
            applyTheme(stored || 'classic');

            document.querySelectorAll('[data-theme-set]').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    applyTheme(btn.getAttribute('data-theme-set'));
                });
            });
        })();
    </script>
</body>
</html>
